version: '3.8'

services:
  # Servicio 1: El Servidor API
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - smat_sqlite_data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/smat.db
    # Reto Semana 13: Control de salud (Healthcheck)
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/docs"]
      interval: 5s
      timeout: 3s
      retries: 3

  # Servicio 2: El traductor de protocolos loT
  mqtt_bridge:
    build: ./iot_device
    depends_on:
      backend:
        condition: service_healthy
    environment:
      - API_URL=http://backend:8000/lecturas/
      - JWT_TOKEN= "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJzdWIiOiJhZG1pbl9zbWF0IiwiZXhwIjoxNzgyOTI1NjU4fQ.xVoEQso6FV9qrU8OdIk7P5uofQyxG4Z5qpj6BLTOnes"

volumes:
  # Define el volumen para que la DB sobreviva a reinicios
  smat_sqlite_data: